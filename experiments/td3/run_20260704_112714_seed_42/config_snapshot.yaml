algorithm:
  name: TD3
camo_td3:
  decoding_threshold: 1.0
  energy_limit_watts: 0.1
  eta_explore_decay: 0.9999
  eta_explore_init: 0.05
  history_length: 10
  interference_limit_dbm: -50.0
  lambda_clamp_max: 50.0
  lambda_inf_init: 0.1
  lambda_nrg_init: 0.1
  lambda_qos_init: 0.1
  lr_lambda: 0.001
  penalty_coef_inf: 10.0
  penalty_coef_nrg: 10.0
  pu_rate_threshold: 1.5
channel:
  fading_type: rayleigh
  noise_power_dbm: -114.0
  path_loss_exponent: 3.0
evaluation:
  eval_episodes: 5
  eval_interval: 500
  save_dir: experiments/checkpoints/
logging:
  log_dir: experiments/runs/
  log_interval: 10
  tensorboard_enabled: true
  wandb_enabled: false
network:
  p_max_su: 20.0
  p_primary: 30.0
  pr_coords:
  - 100.0
  - 0.0
  pt_coords:
  - 0.0
  - 0.0
  sud_coords:
  - 90.0
  - 20.0
  sur_coords:
  - 50.0
  - 10.0
  sus_coords:
  - 10.0
  - 20.0
simulation:
  seed: 42
  time_steps_per_episode: 500
training:
  batch_size: 128
  buffer_size: 100000
  exploration_noise: 0.1
  gamma: 0.99
  lr_actor: 0.0003
  lr_critic: 0.0003
  noise_clip: 0.5
  policy_delay: 2
  policy_noise: 0.2
  start_steps: 1000
  tau: 0.005
  total_steps: 1500000
